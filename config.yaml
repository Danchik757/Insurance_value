dataset:
  paths:
    - "data/raw/motor_data11-14lats.csv"
    - "data/raw/motor_data14-2018.csv"

stream:
  batch_size: 50000
  delay_seconds: 0.5

storage:
  path: "database.db"
  raw_table: "raw_batches"
  cleaned_table: "cleaned_batches"
  metadata_table: "metadata"
  cleaned_csv: "data/cleaned/cleaned_data.csv"

logging:
  level: "INFO"
  path: "collection.log"
  reports_dir: "reports"

data_analysis:
  quality:
    thresholds:
      max_null_ratio: 0.3
      max_outlier_ratio: 0.05
      min_unique_ratio: 0.01
    numeric_columns: ["INSURED_VALUE", "PREMIUM", "PROD_YEAR", "SEATS_NUM", "CARRYING_CAPACITY", "CCM_TON"]
    categorical_columns: ["SEX", "INSR_TYPE", "TYPE_VEHICLE", "MAKE", "USAGE"]
    date_columns: ["INSR_BEGIN", "INSR_END"]

  cleaning:
    imputation_method: "median"
    outlier_method: "iqr"
    outlier_threshold: 3.0

  eda:
    enabled: true
    max_categories: 15

  feature_engineering:
    enabled: true
    features:
      - "policy_duration_days"
      - "premium_per_seat"
      - "insured_value_per_ton"
      - "claim_ratio"
      - "is_claim"
      - "premium_log"

  drift_detection:
    enabled: true
    reference_batches: 5
    method: "psi"
    psi_threshold: 0.2
    monitor_columns: ["INSURED_VALUE", "PREMIUM", "CLAIM_PAID", "SEATS_NUM", "TYPE_VEHICLE", "USAGE"]

data_preparation:
  processed_a: "data/processed/prepared_A.csv"
  processed_b: "data/processed/prepared_B.csv"
  target_column: "CLAIM_PAID"
  date_format: "%d-%b-%y"
  drop_columns:
    - "INSR_BEGIN"
    - "INSR_END"
    - "OBJECT_ID"
  log_file: "preparation.log"

model_training:
  models_dir: "models/versions"
  encoders_path: "models/encoders.pkl"
  train_split: 0.8
  inflation_year: 2014
  inflation_columns:
    - "CLAIM_PAID"
    - "INSURED_VALUE"
    - "PREMIUM"
  log_file: "training.log"
  decision_tree:
    max_depth: 10
    random_state: 42
  knn:
    n_neighbors: 5
  sgd:
    max_iter: 1000
    random_state: 42

model_validation:
  log_file: "validation.log"

model_serving:
  best_model_path: "models/best_model.pkl"
  predictions_path: "data/predictions.csv"
  performance_log: "reports/performance_log.json"
  log_file: "serving.log"
